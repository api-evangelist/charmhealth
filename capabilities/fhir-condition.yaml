naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Condition
  description: 'CharmHealth FHIR API — Condition. 1 operations. Lead operation: Search Condition. Self-contained Naftiko capability
    covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Condition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-condition
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Condition business capability. Self-contained, no shared references.
    resources:
    - name: Condition
      path: /Condition
      operations:
      - name: searchcondition
        method: GET
        description: Search Condition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: category
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-condition-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Condition. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/condition
      name: condition
      description: REST surface for Condition.
      operations:
      - method: GET
        name: searchcondition
        description: Search Condition
        call: fhir-condition.searchcondition
        with:
          patient: rest.patient
          category: rest.category
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-condition-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Condition. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-condition
      description: Search Condition
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-condition.searchcondition
      with:
        patient: tools.patient
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
