apis:
  - aid: charmhealth:fhir-api
    name: CharmHealth FHIR API
    description: >-
      CharmHealth EHR FHIR API conforms to FHIR R4 (4.0.1) and the US Core STU 3.1.1 Implementation Guide. It supports
      30+ FHIR resources covering clinical (AllergyIntolerance, Condition, Procedure, Immunization, MedicationRequest),
      care coordination (CarePlan, CareTeam, Goal, Encounter), administrative (Patient, Practitioner, Organization,
      Location, Appointment), diagnostic (DiagnosticReport, Observation), and documentation resources
      (DocumentReference, QuestionnaireResponse, Provenance). Authentication uses SMART on FHIR with OAuth 2.0
      authorization code flow, PKCE for public clients, and JWT-assertion backend services authorization for system
      access.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.charmhealth.com/resources/fhir/index.html
    baseURL: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    tags:
