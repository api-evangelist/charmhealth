naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Organization
  description: 'CharmHealth FHIR API — Organization. 1 operations. Lead operation: Search Organization. Self-contained Naftiko
    capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Organization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-organization
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Organization business capability. Self-contained, no shared references.
    resources:
    - name: Organization
      path: /Organization
      operations:
      - name: searchorganization
        method: GET
        description: Search Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-organization-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Organization. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organization
      name: organization
      description: REST surface for Organization.
      operations:
      - method: GET
        name: searchorganization
        description: Search Organization
        call: fhir-organization.searchorganization
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-organization-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Organization. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-organization
      description: Search Organization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-organization.searchorganization
      outputParameters:
      - type: object
        mapping: $.
