        method: GET
        description: Search CareTeam
        inputParameters:
        - name: patient
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: documentreference
      path: /DocumentReference
      operations:
      - name: searchdocumentreference
        method: GET
        description: Search DocumentReference
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: type
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: practitioner
      path: /Practitioner
      operations:
