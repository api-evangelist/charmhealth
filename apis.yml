aid: charmhealth
name: CharmHealth
description: >-
  CharmHealth is a healthcare technology platform offering Electronic Health Records (EHR), Practice Management, Revenue
  Cycle Management, Patient Engagement, and TeleHealth tooling. CharmHealth exposes an HL7 FHIR R4 API conformant to the
  US Core Implementation Guide that lets third-party applications query patient medical records, manage clinical
  resources, and integrate with the EHR using SMART on FHIR OAuth 2.0 authorization.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/charmhealth/refs/heads/main/apis.yml
