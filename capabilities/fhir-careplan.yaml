naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — CarePlan
  description: 'CharmHealth FHIR API — CarePlan. 1 operations. Lead operation: Search CarePlan. Self-contained Naftiko capability
    covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - CarePlan
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-careplan
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — CarePlan business capability. Self-contained, no shared references.
    resources:
    - name: CarePlan
      path: /CarePlan
      operations:
      - name: searchcareplan
        method: GET
        description: Search CarePlan
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-careplan-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — CarePlan. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/careplan
      name: careplan
      description: REST surface for CarePlan.
      operations:
      - method: GET
        name: searchcareplan
        description: Search CarePlan
        call: fhir-careplan.searchcareplan
        with:
          patient: rest.patient
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-careplan-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — CarePlan. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: search-careplan
      description: Search CarePlan
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-careplan.searchcareplan
      with:
        patient: tools.patient
      outputParameters:
      - type: object
        mapping: $.
