naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Observation
  description: 'CharmHealth FHIR API — Observation. 1 operations. Lead operation: Search Observation. Self-contained Naftiko
    capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Observation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-observation
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Observation business capability. Self-contained, no shared references.
    resources:
    - name: Observation
      path: /Observation
      operations:
      - name: searchobservation
        method: GET
        description: Search Observation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: category
          in: query
          type: string
        - name: code
          in: query
          type: string
        - name: date
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-observation-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Observation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/observation
      name: observation
      description: REST surface for Observation.
      operations:
      - method: GET
        name: searchobservation
        description: Search Observation
        call: fhir-observation.searchobservation
        with:
          patient: rest.patient
          category: rest.category
          code: rest.code
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-observation-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Observation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-observation
      description: Search Observation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-observation.searchobservation
      with:
        patient: tools.patient
        category: tools.category
        code: tools.code
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
