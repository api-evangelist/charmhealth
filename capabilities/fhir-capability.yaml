naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Capability
  description: 'CharmHealth FHIR API — Capability. 1 operations. Lead operation: Get FHIR CapabilityStatement. Self-contained
    Naftiko capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Capability
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-capability
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Capability business capability. Self-contained, no shared references.
    resources:
    - name: metadata
      path: /metadata
      operations:
      - name: getcapabilitystatement
        method: GET
        description: Get FHIR CapabilityStatement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-capability-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Capability. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metadata
      name: metadata
      description: REST surface for metadata.
      operations:
      - method: GET
        name: getcapabilitystatement
        description: Get FHIR CapabilityStatement
        call: fhir-capability.getcapabilitystatement
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-capability-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Capability. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-fhir-capabilitystatement
      description: Get FHIR CapabilityStatement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-capability.getcapabilitystatement
      outputParameters:
      - type: object
        mapping: $.
