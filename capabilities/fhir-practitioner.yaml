naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Practitioner
  description: 'CharmHealth FHIR API — Practitioner. 1 operations. Lead operation: Search Practitioner. Self-contained Naftiko
    capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Practitioner
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-practitioner
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Practitioner business capability. Self-contained, no shared references.
    resources:
    - name: Practitioner
      path: /Practitioner
      operations:
      - name: searchpractitioner
        method: GET
        description: Search Practitioner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: identifier
          in: query
          type: string
        - name: name
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-practitioner-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Practitioner. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/practitioner
      name: practitioner
      description: REST surface for Practitioner.
      operations:
      - method: GET
        name: searchpractitioner
        description: Search Practitioner
        call: fhir-practitioner.searchpractitioner
        with:
          identifier: rest.identifier
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-practitioner-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Practitioner. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-practitioner
      description: Search Practitioner
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-practitioner.searchpractitioner
      with:
        identifier: tools.identifier
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
