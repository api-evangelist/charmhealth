naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Appointment
  description: 'CharmHealth FHIR API — Appointment. 1 operations. Lead operation: Search Appointment. Self-contained Naftiko
    capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Appointment
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-appointment
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Appointment business capability. Self-contained, no shared references.
    resources:
    - name: Appointment
      path: /Appointment
      operations:
      - name: searchappointment
        method: GET
        description: Search Appointment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: date
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-appointment-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Appointment. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/appointment
      name: appointment
      description: REST surface for Appointment.
      operations:
      - method: GET
        name: searchappointment
        description: Search Appointment
        call: fhir-appointment.searchappointment
        with:
          patient: rest.patient
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-appointment-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Appointment. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-appointment
      description: Search Appointment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-appointment.searchappointment
      with:
        patient: tools.patient
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
