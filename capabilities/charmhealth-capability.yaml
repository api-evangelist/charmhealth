naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API
  description: HL7 FHIR R4 (4.0.1) REST API exposed by CharmHealth EHR conforming to the US Core 3.1.1 Implementation Guide.
    Supports SMART on FHIR authorization for patient-facing apps, provider-facing apps, and backend services. Resource paths
    follow FHIR conventions and accept standard FHIR search parameters.
  tags:
  - Charmhealth
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: charmhealth
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API HTTP API.
    authentication:
      type: bearer
      token: '{{CHARMHEALTH_TOKEN}}'
    resources:
    - name: metadata
      path: /metadata
      operations:
      - name: getcapabilitystatement
        method: GET
        description: Get FHIR CapabilityStatement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: patient-id
      path: /Patient/{id}
      operations:
      - name: readpatient
        method: GET
        description: Read Patient
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: patient
      path: /Patient
      operations:
      - name: searchpatient
        method: GET
        description: Search Patient
        inputParameters:
        - name: identifier
          in: query
          type: string
        - name: name
          in: query
          type: string
        - name: birthdate
          in: query
          type: string
        - name: gender
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: allergyintolerance
      path: /AllergyIntolerance
      operations:
      - name: searchallergyintolerance
        method: GET
        description: Search AllergyIntolerance
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: clinical-status
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: condition
      path: /Condition
      operations:
      - name: searchcondition
        method: GET
        description: Search Condition
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: category
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: encounter
      path: /Encounter
      operations:
      - name: searchencounter
        method: GET
        description: Search Encounter
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: date
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: observation
      path: /Observation
      operations:
      - name: searchobservation
        method: GET
        description: Search Observation
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: category
          in: query
          type: string
        - name: code
          in: query
          type: string
        - name: date
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: medicationrequest
      path: /MedicationRequest
      operations:
      - name: searchmedicationrequest
        method: GET
        description: Search MedicationRequest
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: status
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: immunization
      path: /Immunization
      operations:
      - name: searchimmunization
        method: GET
        description: Search Immunization
        inputParameters:
        - name: patient
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: careplan
      path: /CarePlan
      operations:
      - name: searchcareplan
        method: GET
        description: Search CarePlan
        inputParameters:
        - name: patient
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: careteam
      path: /CareTeam
      operations:
