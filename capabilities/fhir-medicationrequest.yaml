naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — MedicationRequest
  description: 'CharmHealth FHIR API — MedicationRequest. 1 operations. Lead operation: Search MedicationRequest. Self-contained
    Naftiko capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - MedicationRequest
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-medicationrequest
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — MedicationRequest business capability. Self-contained, no shared references.
    resources:
    - name: MedicationRequest
      path: /MedicationRequest
      operations:
      - name: searchmedicationrequest
        method: GET
        description: Search MedicationRequest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: status
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-medicationrequest-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — MedicationRequest. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/medicationrequest
      name: medicationrequest
      description: REST surface for MedicationRequest.
      operations:
      - method: GET
        name: searchmedicationrequest
        description: Search MedicationRequest
        call: fhir-medicationrequest.searchmedicationrequest
        with:
          patient: rest.patient
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-medicationrequest-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — MedicationRequest. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: search-medicationrequest
      description: Search MedicationRequest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-medicationrequest.searchmedicationrequest
      with:
        patient: tools.patient
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
