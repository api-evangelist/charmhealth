naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Immunization
  description: 'CharmHealth FHIR API — Immunization. 1 operations. Lead operation: Search Immunization. Self-contained Naftiko
    capability covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Immunization
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-immunization
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Immunization business capability. Self-contained, no shared references.
    resources:
    - name: Immunization
      path: /Immunization
      operations:
      - name: searchimmunization
        method: GET
        description: Search Immunization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-immunization-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Immunization. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/immunization
      name: immunization
      description: REST surface for Immunization.
      operations:
      - method: GET
        name: searchimmunization
        description: Search Immunization
        call: fhir-immunization.searchimmunization
        with:
          patient: rest.patient
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-immunization-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Immunization. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-immunization
      description: Search Immunization
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-immunization.searchimmunization
      with:
        patient: tools.patient
      outputParameters:
      - type: object
        mapping: $.
