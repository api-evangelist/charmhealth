naftiko: 1.0.0-alpha2
info:
  label: CharmHealth FHIR API — Encounter
  description: 'CharmHealth FHIR API — Encounter. 1 operations. Lead operation: Search Encounter. Self-contained Naftiko capability
    covering one Charmhealth business surface.'
  tags:
  - Charmhealth
  - Encounter
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CHARMHEALTH_API_KEY: CHARMHEALTH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-encounter
    baseUri: https://ehr2.charmtracker.com/api/ehr/v2/fhir
    description: CharmHealth FHIR API — Encounter business capability. Self-contained, no shared references.
    resources:
    - name: Encounter
      path: /Encounter
      operations:
      - name: searchencounter
        method: GET
        description: Search Encounter
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: patient
          in: query
          type: string
        - name: date
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.CHARMHEALTH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-encounter-rest
    port: 8080
    description: REST adapter for CharmHealth FHIR API — Encounter. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/encounter
      name: encounter
      description: REST surface for Encounter.
      operations:
      - method: GET
        name: searchencounter
        description: Search Encounter
        call: fhir-encounter.searchencounter
        with:
          patient: rest.patient
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-encounter-mcp
    port: 9090
    transport: http
    description: MCP adapter for CharmHealth FHIR API — Encounter. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: search-encounter
      description: Search Encounter
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-encounter.searchencounter
      with:
        patient: tools.patient
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
